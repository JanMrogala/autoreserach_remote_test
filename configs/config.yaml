model:
  arch: cnn
  channels: 32
  hidden_dim: 128
  num_layers: 2
  dropout: 0.15
  lr: 3e-3
  weight_decay: 1e-4
  optimizer: adamw
  scheduler: cosine

training:
  max_epochs: 15
  batch_size: 128

wandb:
  project: "mnist-autoresearch"
  entity: null

save_artifacts:
  - "configs/config.yaml"
  - "model.py"
  - "train.py"
